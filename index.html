<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Warfare – Global Conflict</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1b1f24;
    color: white;
    overflow: hidden;
}

#gameContainer {
    display: flex;
    height: 100vh;
}

#map {
    flex: 3;
}

#sidePanel {
    flex: 1;
    background: #111;
    padding: 10px;
    border-left: 2px solid #333;
    overflow-y: auto;
}

button {
    padding: 6px 10px;
    margin: 4px 0;
    background: #2c3e50;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #34495e;
}

#log {
    background: black;
    padding: 5px;
    height: 200px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>
<body>

<div id="gameContainer">

<div id="map"></div>

<div id="sidePanel">
    <h2 id="selectedName">Select Country</h2>
    <div id="stats"></div>
    <button onclick="attack()">Attack</button>
    <button onclick="retreat()">Retreat</button>
    <h3>Battle Log</h3>
    <div id="log"></div>
</div>

</div>

<script>
let map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let selected = null;

let countries = {
    usa: { name: "USA", owner: "player", infantry: 50, tanks: 10, coords: [37, -95] },
    russia: { name: "Russia", owner: "ai", infantry: 40, tanks: 8, coords: [60, 100] },
    china: { name: "China", owner: "ai", infantry: 45, tanks: 7, coords: [35, 105] },
    iran: { name: "Iran", owner: "ai", infantry: 25, tanks: 4, coords: [32, 53] },
    nk: { name: "North Korea", owner: "ai", infantry: 20, tanks: 3, coords: [40, 127] }
};

let markers = {};

function getColor(owner) {
    if (owner === "player") return "green";
    if (owner === "ai") return "red";
    return "gray";
}

function log(msg) {
    let logBox = document.getElementById("log");
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
}

function updateMarker(id) {
    let c = countries[id];
    if (markers[id]) {
        map.removeLayer(markers[id]);
    }
    markers[id] = L.circleMarker(c.coords, {
        radius: 10,
        fillColor: getColor(c.owner),
        color: "#000",
        weight: 1,
        fillOpacity: 0.8
    }).addTo(map);

    markers[id].on("click", () => selectCountry(id));
}

function selectCountry(id) {
    selected = id;
    let c = countries[id];
    document.getElementById("selectedName").innerText = c.name;
    document.getElementById("stats").innerHTML =
        "Owner: " + c.owner +
        "<br>Infantry: " + c.infantry +
        "<br>Tanks: " + c.tanks;
}

function attack() {
    if (!selected) return;
    let defender = countries[selected];
    let attacker = countries["usa"];
    if (defender.owner === "player") return;

    let attackPower = attacker.infantry + attacker.tanks * 3 + Math.random()*20;
    let defendPower = defender.infantry + defender.tanks * 3 + Math.random()*20;

    if (attackPower > defendPower) {
        log("USA captured " + defender.name);
        defender.owner = "player";
        defender.infantry = Math.floor(attacker.infantry/2);
        defender.tanks = Math.floor(attacker.tanks/2);
        attacker.infantry = Math.floor(attacker.infantry/2);
        attacker.tanks = Math.floor(attacker.tanks/2);
    } else {
        log("Attack failed on " + defender.name);
        attacker.infantry -= 5;
        if (attacker.infantry < 0) attacker.infantry = 0;
    }

    updateMarker(selected);
    selectCountry(selected);
    aiTurn();
}

function retreat() {
    if (!selected) return;
    let c = countries[selected];
    if (c.owner === "player" && selected !== "usa") {
        countries["usa"].infantry += c.infantry;
        countries["usa"].tanks += c.tanks;
        c.infantry = 0;
        c.tanks = 0;
        log("Troops retreated to USA");
        selectCountry(selected);
    }
}

function aiTurn() {
    let aiList = Object.keys(countries).filter(id => countries[id].owner === "ai");
    if (aiList.length === 0) return;

    let attackerId = aiList[Math.floor(Math.random()*aiList.length)];
    let attacker = countries[attackerId];

    let defender = countries["usa"];

    let attackPower = attacker.infantry + attacker.tanks * 3 + Math.random()*15;
    let defendPower = defender.infantry + defender.tanks * 3 + Math.random()*15;

    if (attackPower > defendPower) {
        log(attacker.name + " damaged USA!");
        defender.infantry -= 5;
        if (defender.infantry < 0) defender.infantry = 0;
    } else {
        log(attacker.name + " failed attacking USA");
    }
}

for (let id in countries) {
    updateMarker(id);
}
</script>

</body>
</html>
