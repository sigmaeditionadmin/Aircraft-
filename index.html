<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>
<style>
body {
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
}
#log {
    width:260px;
    height:100%;
    overflow-y:auto;
    background:#111;
    padding:10px;
    box-sizing:border-box;
}
#main {
    flex-grow:1;
    display:flex;
    flex-direction:column;
}
#map {
    flex-grow:1;
    position:relative;
    background:#2e3b2e;
    margin:5px;
    overflow:hidden;
}
#turn-info {
    padding:5px;
}

.kingdom {
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:12px;
    text-align:center;
    border:2px solid black;
}

.player { background:gold; color:black; }
.enemy { background:crimson; }
.ally { background:royalblue; }

.action-btns {
    position:absolute;
    display:flex;
    gap:5px;
    top:-40px;
    left:0;
}
.action-btns button {
    padding:4px 6px;
    font-size:10px;
}

/* Arrow line */
.arrow {
    position:absolute;
    height:3px;
    background:white;
    transform-origin:0 0;
}
</style>
</head>
<body>

<div id="log">
    <h2>👑 Iron Crown</h2>
    <h3>Battle Log</h3>
</div>

<div id="main">
    <div>
        <button onclick="resetGame()">Reset</button>
        <span id="turn-info"></span>
    </div>
    <div id="map"></div>
</div>

<script>
let kingdoms = [];
let selectedKingdoms = [];
let turn = 1;
let attacksThisTurn = 0;

const map = document.getElementById("map");
const log = document.getElementById("log");
const turnInfo = document.getElementById("turn-info");

function addLog(text){
    log.innerHTML += text + "<br>";
    log.scrollTop = log.scrollHeight;
}

function updateTurnInfo(){
    let allyCount = kingdoms.filter(k=>k.owner==="ally").length;
    turnInfo.innerText = "Turn: "+turn+" | Attacks: "+attacksThisTurn+"/2 | Allies: "+allyCount+"/2";
}

/* --- SAFE SPAWN (no overlapping) --- */
function generateMap(){
    kingdoms = [];
    const minDistance = 12;

    for(let i=0;i<12;i++){
        let x,y,valid;

        do{
            valid = true;
            x = Math.random()*80;
            y = Math.random()*80;

            for(let k of kingdoms){
                let dx = k.x - x;
                let dy = k.y - y;
                if(Math.sqrt(dx*dx + dy*dy) < minDistance){
                    valid = false;
                    break;
                }
            }
        }while(!valid);

        kingdoms.push({
            id:i,
            x:x,
            y:y,
            troops:30+Math.floor(Math.random()*20),
            owner: i===0 ? "player" : "enemy"
        });
    }
}

/* --- DRAW MAP --- */
function drawMap(){
    map.innerHTML="";
    kingdoms.forEach(k=>{
        const div = document.createElement("div");
        div.className = "kingdom " + k.owner;
        div.style.left = k.x+"%";
        div.style.top = k.y+"%";
        div.innerHTML="🏰<br>"+k.troops;

        div.onclick = ()=>handleClick(k,div);

        map.appendChild(div);
    });
}

/* --- CLICK --- */
function handleClick(k,div){

    if(k.owner==="player" || k.owner==="ally"){
        if(selectedKingdoms.includes(k)){
            selectedKingdoms = selectedKingdoms.filter(x=>x!==k);
        } else {
            selectedKingdoms.push(k);
        }
        drawMap();
        return;
    }

    if(selectedKingdoms.length===0) return;

    const btnBox = document.createElement("div");
    btnBox.className="action-btns";

    const attackBtn = document.createElement("button");
    attackBtn.innerText="Attack";
    attackBtn.onclick=(e)=>{
        e.stopPropagation();
        playerAttack(selectedKingdoms,k);
    };

    btnBox.appendChild(attackBtn);

    let allyCount = kingdoms.filter(x=>x.owner==="ally").length;

    if(allyCount < 2){
        const allyBtn = document.createElement("button");
        allyBtn.innerText="Alliance";
        allyBtn.onclick=(e)=>{
            e.stopPropagation();
            requestAlliance(k);
        };
        btnBox.appendChild(allyBtn);
    }

    div.appendChild(btnBox);
}

/* --- DRAW ARROW --- */
function drawArrow(from,to){
    const arrow = document.createElement("div");
    arrow.className="arrow";

    let x1 = from.x;
    let y1 = from.y;
    let x2 = to.x;
    let y2 = to.y;

    let dx = x2-x1;
    let dy = y2-y1;

    let length = Math.sqrt(dx*dx+dy*dy);
    let angle = Math.atan2(dy,dx)*(180/Math.PI);

    arrow.style.width = length+"%";
    arrow.style.left = x1+"%";
    arrow.style.top = y1+"%";
    arrow.style.transform="rotate("+angle+"deg)";

    map.appendChild(arrow);

    setTimeout(()=>arrow.remove(),500);
}

/* --- PLAYER ATTACK --- */
function playerAttack(attackers,defender){

    attacksThisTurn++;
    drawArrow(attackers[0],defender);

    let attackPower = attackers.reduce((sum,a)=>sum+a.troops*(Math.random()*0.4+0.8),0);
    let defendPower = defender.troops*(Math.random()*0.5+0.8);

    if(attackPower>defendPower){
        defender.owner="player";
        defender.troops=Math.floor(attackPower*0.5);
        addLog("✅ You conquered a kingdom!");
    } else {
        addLog("❌ You lost the battle!");
    }

    selectedKingdoms=[];
    drawMap();
    checkWin();

    if(attacksThisTurn>=2){
        endTurn();
    } else {
        aiTurn();
    }

    updateTurnInfo();
}

/* --- ALLIANCE --- */
function requestAlliance(k){

    let allyCount = kingdoms.filter(x=>x.owner==="ally").length;
    if(allyCount>=2){
        addLog("⚠ Max 2 allies at a time!");
        return;
    }

    if(Math.random()<0.4){
        k.owner="ally";
        addLog("🤝 Alliance formed!");
    } else {
        addLog("❌ Alliance rejected.");
    }

    drawMap();
    updateTurnInfo();
}

/* --- AI TURN (AI attacks AI + player + allies) --- */
function aiTurn(){

    let attackers = kingdoms.filter(k=>k.owner==="enemy");
    if(attackers.length===0) return;

    let attacker = attackers[Math.floor(Math.random()*attackers.length)];

    let possibleTargets = kingdoms.filter(k=>k!==attacker);
    if(possibleTargets.length===0) return;

    let target = possibleTargets[Math.floor(Math.random()*possibleTargets.length)];

    drawArrow(attacker,target);

    let attackPower = attacker.troops*(Math.random()*0.4+0.8);
    let defendPower = target.troops*(Math.random()*0.5+0.8);

    if(attackPower>defendPower){
        attacker.troops=Math.floor(attacker.troops*0.6);
        target.owner="enemy";
        target.troops=Math.floor(attackPower*0.6);
        addLog("💀 AI conquered a kingdom!");
    }

    drawMap();
    checkWin();
}

/* --- END TURN --- */
function endTurn(){
    turn++;
    attacksThisTurn=0;
    aiTurn();
    updateTurnInfo();
}

/* --- WIN CHECK --- */
function checkWin(){
    let playerSide = kingdoms.filter(k=>k.owner==="player" || k.owner==="ally");
    let enemies = kingdoms.filter(k=>k.owner==="enemy");

    if(enemies.length===0){
        alert("🏆 You conquered the world!");
    }
    if(playerSide.length===0){
        alert("💀 You have fallen!");
    }
}

/* --- RESET --- */
function resetGame(){
    turn=1;
    attacksThisTurn=0;
    selectedKingdoms=[];
    log.innerHTML="<h2>👑 Iron Crown</h2><h3>Battle Log</h3>";
    generateMap();
    drawMap();
    updateTurnInfo();
}

/* --- START --- */
generateMap();
drawMap();
updateTurnInfo();
</script>

</body>
</html>
