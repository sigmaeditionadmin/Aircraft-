<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

#map{
  position:relative;
  width:900px;
  height:550px;
  margin:auto;
  background:#1e1e1e;
  border:3px solid #555;
  overflow:hidden;
}

.kingdom{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  text-align:center;
  line-height:20px;
  padding-top:8px;
  font-size:12px;
  cursor:pointer;
  z-index:2;
}

.player{background:green;}
.enemy{background:crimson;}
.ally{background:royalblue;}

.arrow-layer{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.attack-arrow{
  stroke:red;
  stroke-width:3;
  fill:none;
  marker-end:url(#arrowhead);
  animation:fadeArrow 1s forwards;
}

@keyframes fadeArrow{
  0%{opacity:1;}
  100%{opacity:0;}
}

.action-btns{
  position:absolute;
  top:-35px;
  left:-20px;
  z-index:5;
}

button{
  margin:2px;
  cursor:pointer;
}

#log{
  height:120px;
  overflow-y:auto;
  background:#222;
  margin-top:10px;
  padding:5px;
  border:1px solid #555;
}
</style>
</head>
<body>

<h1>👑 Iron Crown</h1>

<div id="map">
<svg class="arrow-layer" id="arrowLayer">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
      refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="red"/>
    </marker>
  </defs>
</svg>
</div>

<div id="log"></div>

<script>
const map=document.getElementById("map");
const log=document.getElementById("log");

let kingdoms=[];
let selectedKingdoms=[];

function addLog(text){
  log.innerHTML+=text+"<br>";
  log.scrollTop=log.scrollHeight;
}

function randomPosition(){
  let valid=false;
  let x,y;
  while(!valid){
    x=Math.random()*85+5;
    y=Math.random()*85+5;
    valid=true;
    for(let k of kingdoms){
      if(Math.hypot(k.x-x,k.y-y)<10) valid=false;
    }
  }
  return {x,y};
}

function createKingdom(owner,troops){
  const pos=randomPosition();
  kingdoms.push({owner,troops,x:pos.x,y:pos.y});
}

function init(){
  kingdoms=[];
  selectedKingdoms=[];
  createKingdom("player",45);
  for(let i=0;i<6;i++){
    createKingdom("enemy",30+Math.floor(Math.random()*20));
  }
  drawMap();
}

function drawMap(){
  map.querySelectorAll(".kingdom").forEach(e=>e.remove());

  kingdoms.forEach(k=>{
    const div=document.createElement("div");
    div.className="kingdom "+k.owner;
    div.style.left=k.x+"%";
    div.style.top=k.y+"%";
    div.innerHTML="🏰<br>"+k.troops;
    div.onclick=()=>handleClick(k,div);
    map.appendChild(div);
  });

  highlightSelected();
}

function highlightSelected(){
  document.querySelectorAll(".kingdom").forEach(d=>d.style.boxShadow="none");
  selectedKingdoms.forEach(k=>{
    const match=[...document.querySelectorAll(".kingdom")]
      .find(d=>parseFloat(d.style.left)===k.x && parseFloat(d.style.top)===k.y);
    if(match) match.style.boxShadow="0 0 15px 4px yellow";
  });
}

function handleClick(k,div){

  if(k.owner==="player"||k.owner==="ally"){
    if(selectedKingdoms.includes(k)){
      selectedKingdoms=selectedKingdoms.filter(x=>x!==k);
      addLog("Deselected kingdom with "+k.troops+" troops.");
    }else{
      selectedKingdoms.push(k);
      addLog("Selected kingdom with "+k.troops+" troops.");
    }
    drawMap();
    return;
  }

  if(selectedKingdoms.length===0) return;

  const box=document.createElement("div");
  box.className="action-btns";

  const attackBtn=document.createElement("button");
  attackBtn.innerText="Attack";
  attackBtn.onclick=(e)=>{e.stopPropagation();playerAttack(selectedKingdoms,k);};
  box.appendChild(attackBtn);

  const spyBtn=document.createElement("button");
  spyBtn.innerText="Spy";
  spyBtn.onclick=(e)=>{e.stopPropagation();sendSpy(selectedKingdoms[0],k);};
  box.appendChild(spyBtn);

  let allyCount=kingdoms.filter(x=>x.owner==="ally").length;
  if(allyCount<2){
    const allyBtn=document.createElement("button");
    allyBtn.innerText="Alliance";
    allyBtn.onclick=(e)=>{e.stopPropagation();requestAlliance(k);};
    box.appendChild(allyBtn);
  }

  div.appendChild(box);
}

function drawArrow(from,to){
  const svg=document.getElementById("arrowLayer");
  const rect=map.getBoundingClientRect();

  const x1=from.x/100*rect.width;
  const y1=from.y/100*rect.height;
  const x2=to.x/100*rect.width;
  const y2=to.y/100*rect.height;

  const line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",x1);
  line.setAttribute("y1",y1);
  line.setAttribute("x2",x2);
  line.setAttribute("y2",y2);
  line.setAttribute("class","attack-arrow");
  svg.appendChild(line);

  setTimeout(()=>line.remove(),1000);
}

function playerAttack(attackerList,target){
  attackerList.forEach(attacker=>{
    if(attacker.troops<=1) return;

    drawArrow(attacker,target);

    const attack=Math.floor(attacker.troops*(0.4+Math.random()*0.4));
    const defense=Math.floor(target.troops*(0.3+Math.random()*0.4));

    if(attack>defense){
      addLog("⚔ Victory! "+attack+" vs "+defense);
      target.owner=attacker.owner;
      target.troops=Math.floor(attacker.troops/2);
    }else{
      addLog("🛡 Defeat! "+attack+" vs "+defense);
    }

    attacker.troops=Math.max(1,Math.floor(attacker.troops/2));
  });

  removeDead();
  selectedKingdoms=[];
  drawMap();
  setTimeout(aiTurn,1000);
}

function aiTurn(){

  let aiKingdoms=kingdoms.filter(k=>k.owner!=="player"&&k.owner!=="ally");

  aiKingdoms.forEach(ai=>{
    if(ai.troops<=1) return;

    let targets=kingdoms.filter(k=>k!==ai);
    if(targets.length===0) return;

    let target=targets[Math.floor(Math.random()*targets.length)];

    drawArrow(ai,target);

    const attack=Math.floor(ai.troops*(0.4+Math.random()*0.4));
    const defense=Math.floor(target.troops*(0.3+Math.random()*0.4));

    if(attack>defense){
      addLog("⚔ AI conquered a kingdom!");
      target.owner=ai.owner;
      target.troops=Math.floor(ai.troops/2);
    }else{
      addLog("🛡 AI attack failed.");
    }

    ai.troops=Math.max(1,Math.floor(ai.troops/2));
  });

  removeDead();
  drawMap();
}

function requestAlliance(target){
  if(Math.random()<0.5){
    target.owner="ally";
    addLog("🤝 Alliance formed!");
  }else{
    addLog("Alliance rejected!");
  }
  drawMap();
}

function sendSpy(from,target){
  addLog("🕵 Spy sent...");
  setTimeout(()=>{
    addLog("Spy report: "+target.troops+" troops.");
  },500);
}

function removeDead(){
  kingdoms=kingdoms.filter(k=>k.troops>0);
}

init();
</script>

</body>
</html>
