<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World of Warfare – Global Conflict</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

#map{
flex:1;
}

#sidePanel{
width:320px;
background:#1e1e1e;
color:white;
padding:10px;
overflow-y:auto;
}

h2{
margin-top:10px;
}

button{
padding:6px;
margin-top:5px;
width:100%;
}

select{
width:100%;
padding:5px;
}

#log{
background:black;
padding:6px;
margin-top:10px;
height:250px;
overflow-y:auto;
font-size:13px;
}

.stat{
margin:4px 0;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="sidePanel">

<h2>World of Warfare</h2>

<h3>Attack</h3>

<div class="stat">Attacker</div>
<select id="attacker"></select>

<div class="stat">Target</div>
<select id="target"></select>

<div class="stat">Type</div>
<select id="type">
<option value="land">Land</option>
<option value="air">Air</option>
<option value="sea">Sea</option>
</select>

<button onclick="attack()">Launch Attack</button>

<h3>Stats</h3>
<div id="stats"></div>

<h3>Battle Log</h3>
<div id="log"></div>

</div>

<script>

let map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:6}
).addTo(map);


const planeIcon = L.divIcon({
html:"✈️",
className:"",
iconSize:[28,28],
iconAnchor:[14,14]
});

const shipIcon = L.divIcon({
html:"🚢",
className:"",
iconSize:[28,28],
iconAnchor:[14,14]
});


let countries={

USA:{troops:120,coords:[38,-97],owner:"player"},
Brazil:{troops:90,coords:[-10,-55],owner:"ai"},
UK:{troops:80,coords:[55,-3],owner:"ai"},
Germany:{troops:85,coords:[51,10],owner:"ai"},
Russia:{troops:110,coords:[60,100],owner:"ai"},
China:{troops:105,coords:[35,105],owner:"ai"},
India:{troops:95,coords:[22,78],owner:"ai"},
Australia:{troops:70,coords:[-25,133],owner:"ai"}

};


let markers={};

for(let c in countries){

let m=L.marker(countries[c].coords).addTo(map)
.bindPopup(c+"<br>Troops:"+countries[c].troops);

markers[c]=m;

}

function populate(){

let a=document.getElementById("attacker");
let t=document.getElementById("target");

a.innerHTML="";
t.innerHTML="";

for(let c in countries){

a.innerHTML+=`<option>${c}</option>`;
t.innerHTML+=`<option>${c}</option>`;

}

}

populate();

function log(text){

let l=document.getElementById("log");
l.innerHTML+=text+"<br>";
l.scrollTop=l.scrollHeight;

}

function updateStats(){

let s=document.getElementById("stats");
s.innerHTML="";

for(let c in countries){

s.innerHTML+=
`<div class="stat">${c}: ${countries[c].troops}</div>`;

markers[c].setPopupContent(
c+"<br>Troops:"+countries[c].troops
);

}

}

updateStats();



function animateUnit(start,end,icon,speed){

let marker=L.marker(start,{icon:icon}).addTo(map);

let steps=60;

let latStep=(end[0]-start[0])/steps;
let lngStep=(end[1]-start[1])/steps;

let i=0;

let interval=setInterval(()=>{

i++;

marker.setLatLng([
start[0]+latStep*i,
start[1]+lngStep*i
]);

if(i>=steps){

clearInterval(interval);
map.removeLayer(marker);

}

},speed/steps);

}


function attack(){

let attacker=document.getElementById("attacker").value;
let target=document.getElementById("target").value;
let type=document.getElementById("type").value;

if(attacker===target) return;

let atk=countries[attacker];
let def=countries[target];

let atkPower=atk.troops*(0.5+Math.random());
let defPower=def.troops*(0.5+Math.random());

let lossA=Math.floor(Math.random()*20);
let lossD=Math.floor(Math.random()*25);

if(type==="air"){

animateUnit(atk.coords,def.coords,planeIcon,2000);

}

if(type==="sea"){

let coast=[def.coords[0],def.coords[1]];

animateUnit(atk.coords,coast,shipIcon,3500);

}

if(type==="land"){

animateUnit(atk.coords,def.coords,planeIcon,2500);

}


if(atkPower>defPower){

def.troops=Math.max(0,def.troops-lossD);

log("⚔️ "+attacker+" hit "+target+" (-"+lossD+")");

}else{

atk.troops=Math.max(0,atk.troops-lossA);

log("🛡️ "+target+" defended vs "+attacker+" (-"+lossA+")");

}

updateStats();

setTimeout(aiTurn,1500);

}



function aiTurn(){

let keys=Object.keys(countries);

let a=keys[Math.floor(Math.random()*keys.length)];
let b=keys[Math.floor(Math.random()*keys.length)];

if(a===b) return;

let atk=countries[a];
let def=countries[b];

let type=["land","air","sea"][
Math.floor(Math.random()*3)
];

if(type==="air"){

animateUnit(atk.coords,def.coords,planeIcon,2000);

}

if(type==="sea"){

animateUnit(atk.coords,def.coords,shipIcon,3500);

}

let atkPower=atk.troops*(0.5+Math.random());
let defPower=def.troops*(0.5+Math.random());

let lossA=Math.floor(Math.random()*15);
let lossD=Math.floor(Math.random()*15);

if(atkPower>defPower){

def.troops=Math.max(0,def.troops-lossD);

log("🤖 "+a+" attacked "+b+" (-"+lossD+")");

}else{

atk.troops=Math.max(0,atk.troops-lossA);

log("🤖 "+b+" defended vs "+a+" (-"+lossA+")");

}

updateStats();

}

</script>

</body>
</html>
